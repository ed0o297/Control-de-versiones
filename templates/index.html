<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Proyecto Flask</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            font-family: Arial, Helvetica, sans-serif;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
        }

        .contenedor{
            text-align:center;
            background: rgba(255,255,255,0.1);
            padding:50px;
            border-radius:20px;
            backdrop-filter: blur(10px);
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        h1{
            font-size:50px;
            margin-bottom:20px;
        }

        p{
            font-size:22px;
            margin-bottom:30px;
        }

        .boton{
            display:inline-block;
            padding:15px 30px;
            background:white;
            color:#0077ff;
            text-decoration:none;
            border-radius:10px;
            font-weight:bold;
            transition:0.3s;
        }

        .boton:hover{
            background:#0077ff;
            color:white;
        }

    </style>

</head>
<body>

    <div class="contenedor">

        <h1>🚀 Bienvenido</h1>

        <p>
            Mi primera página web publicada con Flask + GitHub + Render
        </p>

        <a href="#" class="boton">
            Proyecto Online
        </a>

    </div>

</body>
</html>
